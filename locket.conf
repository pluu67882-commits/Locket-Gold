#!name=Locket Gold v1.1 - Naturalized
#!desc=Mở khóa Locket Gold (Bản ổn định)
#!author=Dev HoangPhu

[MITM]
hostname = %APPEND% api.revenuecat.com, api.locketcamera.com, *.locketcamera.com

[Header Rewrite]
# Xóa ETag để ép cập nhật script
^https?:\/\/api\.revenuecat\.com\/ header-del X-RevenueCat-ETag

[Script]
# Sử dụng link raw của bạn đã tạo
Locket_v1_1 = type=http-response,pattern=^(https:\/\/api\.revenuecat\.com\/.+\/(receipts|subscribers)|https:\/\/api\.locketcamera\.com\/v1\/users\/self),requires-body=1,max-size=0,script-path=https://raw.githubusercontent.com/pluu67882-commits/Locket-Gold/main/locket_v1.js

# Chặn gói tin xác thực lỗi để tránh bị phát hiện
^https?:\/\/api\.locketcamera\.com\/v1\/subscriptions\/verify reject-dict
